apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app10
  labels:
    app: todo-app10
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-app10
  template:
    metadata:
      labels:
        app: todo-app10
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: todo-app10
        image: 183071452060.dkr.ecr.ap-northeast-2.amazonaws.com/todo-app10:latest
        ports:
        - containerPort: 5000